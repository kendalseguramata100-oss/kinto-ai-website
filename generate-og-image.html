<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador OG Image - KINTO AI</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #1a1a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        h1 { color: #FFB800; font-size: 18px; font-weight: 500; margin: 0; }
        p  { color: #A8A8A8; font-size: 14px; margin: 0; text-align: center; }
        canvas { border: 1px solid #2A2A2A; border-radius: 8px; max-width: 100%; }
        button {
            background: #FFB800; color: #0B0B0B; border: none;
            padding: 12px 32px; font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 15px; font-weight: 700; border-radius: 6px;
            cursor: pointer; letter-spacing: 0.5px;
        }
        button:hover { background: #D49800; }
        .note {
            background: #0B0B0B; border: 1px solid #2A2A2A;
            border-left: 3px solid #FFB800; padding: 12px 20px;
            border-radius: 6px; max-width: 600px;
        }
        .note p { text-align: left; line-height: 1.6; }
        .note code { color: #FFB800; background: #1A1A1A; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
    </style>
</head>
<body>

    <h1>Generador de OG Image — KINTO AI</h1>
    <p>Imagen 1200×630 px para redes sociales. Haz clic en descargar cuando estés conforme.</p>

    <canvas id="ogCanvas" width="1200" height="630"></canvas>

    <button onclick="descargar()">Descargar og-image.png</button>

    <div class="note">
        <p>Después de descargar, mueve el archivo a: <code>images/og-image.png</code> dentro de tu proyecto.</p>
    </div>

    <script>
        const canvas = document.getElementById('ogCanvas');
        const ctx    = canvas.getContext('2d');

        function dibujar(logo) {
            const W = 1200, H = 630;
            const SPLIT = 700; // X donde empieza el lado derecho

            // ── FONDO ──────────────────────────────────────────
            ctx.fillStyle = '#0B0B0B';
            ctx.fillRect(0, 0, W, H);

            // ── GLOW DORADO (lado derecho) ─────────────────────
            const glow = ctx.createRadialGradient(900, H / 2, 0, 900, H / 2, 300);
            glow.addColorStop(0, 'rgba(255, 184, 0, 0.13)');
            glow.addColorStop(1, 'rgba(255, 184, 0, 0)');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, W, H);

            // ── LÍNEA DORADA SUPERIOR ──────────────────────────
            ctx.fillStyle = '#FFB800';
            ctx.fillRect(0, 0, W, 4);

            // ── ACENTO VERTICAL IZQUIERDO ──────────────────────
            ctx.fillStyle = '#FFB800';
            ctx.fillRect(80, 145, 3, 310);

            // ── DIVISOR VERTICAL SUTIL ─────────────────────────
            const divGrad = ctx.createLinearGradient(SPLIT, 80, SPLIT, H - 80);
            divGrad.addColorStop(0,   'rgba(255, 184, 0, 0)');
            divGrad.addColorStop(0.3, 'rgba(255, 184, 0, 0.2)');
            divGrad.addColorStop(0.7, 'rgba(255, 184, 0, 0.2)');
            divGrad.addColorStop(1,   'rgba(255, 184, 0, 0)');
            ctx.fillStyle = divGrad;
            ctx.fillRect(SPLIT, 0, 1, H);

            // ── TÍTULO ─────────────────────────────────────────
            ctx.fillStyle = '#FFB800';
            ctx.font = '700 90px Georgia, serif';
            ctx.fillText('KINTO AI', 110, 265);

            // ── LÍNEA BAJO TÍTULO ──────────────────────────────
            ctx.fillStyle = '#2A2A2A';
            ctx.fillRect(110, 285, 490, 1);

            // ── TAGLINE ────────────────────────────────────────
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '500 30px "Segoe UI", Arial, sans-serif';
            ctx.fillText('Automatización con IA para PYMEs', 110, 340);

            // ── DESCRIPCIÓN ────────────────────────────────────
            ctx.fillStyle = '#888888';
            ctx.font = '400 21px "Segoe UI", Arial, sans-serif';
            ctx.fillText('Escala tu negocio sin aumentar tu equipo.', 110, 388);
            ctx.fillText('Agentes de IA personalizados a tu medida.', 110, 418);

            // ── URL ────────────────────────────────────────────
            ctx.fillStyle = '#FFB800';
            ctx.font = '400 19px "Segoe UI", Arial, sans-serif';
            ctx.fillText('● kintoai.com', 110, 500);

            // ── LOGO (lado derecho) ────────────────────────────
            const rightX = SPLIT;
            const rightW = W - SPLIT;
            const rightCX = rightX + rightW / 2;
            const rightCY = H / 2;

            if (logo && logo.complete && logo.naturalWidth > 0) {
                const maxW = 320;
                const maxH = 160;
                const ratio = Math.min(maxW / logo.naturalWidth, maxH / logo.naturalHeight);
                const lW = logo.naturalWidth  * ratio;
                const lH = logo.naturalHeight * ratio;
                ctx.drawImage(logo, rightCX - lW / 2, rightCY - lH / 2, lW, lH);
            } else {
                // Fallback: "K" monograma semitransparente
                ctx.fillStyle = 'rgba(255, 184, 0, 0.07)';
                ctx.font = '900 300px Georgia, serif';
                ctx.fillText('K', rightCX - 90, rightCY + 110);
                // Texto del logo como fallback
                ctx.fillStyle = 'rgba(255, 184, 0, 0.6)';
                ctx.font = '700 48px Georgia, serif';
                ctx.textAlign = 'center';
                ctx.fillText('KINTO AI', rightCX, rightCY + 10);
                ctx.textAlign = 'left';
            }

            // ── LÍNEA DORADA INFERIOR ──────────────────────────
            ctx.fillStyle = '#FFB800';
            ctx.fillRect(0, H - 4, W, 4);
        }

        // Cargar el logo y dibujar cuando esté listo
        const logo = new Image();
        logo.onload  = () => dibujar(logo);
        logo.onerror = () => {
            console.warn('Logo no cargó — usando fallback.');
            dibujar(null);
        };
        logo.src = 'images/kinto-horizontal-200h.png';

        // Timeout: si después de 2s no cargó el logo, dibujar igual
        setTimeout(() => {
            if (!logo.complete || logo.naturalWidth === 0) dibujar(null);
        }, 2000);

        function descargar() {
            const link = document.createElement('a');
            link.download = 'og-image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
